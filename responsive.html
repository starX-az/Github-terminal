<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-white">
    <div class="bg-blue-400 h-24 w-full"></div>
    <div
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-1 w-full"
    >
      <div
        class="bg-purple-400 h-40 md:h-80 lg:h-[500px] order-1"
      ></div>
      <div
        class="bg-blue-100 h-80 md:h-60 lg:h-[500px] order-2 md:order-3 md:col-span-2 lg:order-2 lg:col-span-1"
      ></div>
      <div
        class="bg-yellow-400 h-32 md:h-80 lg:h-[500px] order-3 md:order-2 lg:order-3"
      ></div>
    </div>
    <div class="bg-blue-400 h-24 w-full"></div>
  </body>
</html>
